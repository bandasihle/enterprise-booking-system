<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Booking System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a2a4a 0%, #0d7377 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container { text-align: center; padding: 2rem; }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        p  { font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.85; }
        .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 0.9rem 2.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-primary { background: #14a085; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.15); color: white; border: 2px solid white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Enterprise Booking System</h1>
        <p>Venue Booking &amp; ICT Lab Seat Allocation Platform</p>
        <div class="btn-group">
            <a href="pages/student/login.html" class="btn btn-primary">Student Login</a>
            <a href="pages/lecturer/login.html" class="btn btn-secondary">Lecturer Login</a>
            <a href="pages/admin/login.html" class="btn btn-secondary">Admin</a>
        </div>
    </div>
</body>
</html>
